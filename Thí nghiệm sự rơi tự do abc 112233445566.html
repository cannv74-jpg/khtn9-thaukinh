<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thí nghiệm Ống Newton - Thạc sĩ Ánh Hà</title>
    <style>
        :root { --primary: #2c3e50; --tube: rgba(200, 230, 255, 0.3); }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { width: 950px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        #sim-box { display: flex; justify-content: center; align-items: center; background: #ddd; border-radius: 10px; height: 600px; }
        canvas { background: transparent; transition: transform 0.7s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .controls { display: flex; flex-direction: column; gap: 20px; }
        .data-panel { background: var(--primary); color: #fff; padding: 20px; border-radius: 10px; font-family: monospace; border-left: 6px solid #3498db; }
        .btn-main { padding: 15px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; background: #27ae60; color: white; }
        .btn-main:hover { background: #219150; transform: scale(1.02); }
        .footer { margin-top: 30px; text-align: center; font-weight: bold; color: var(--primary); border-top: 2px dashed #ccc; padding-top: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="text-align:center; color: var(--primary);">THÍ NGHIỆM SỰ RƠI TỰ DO TRONG ỐNG NEWTON</h2>
    
    <div class="main-grid">
        <div id="sim-box">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="data-panel">
                <h4 style="margin:0 0 10px 0; color: #f1c40f;">DỮ LIỆU CẢM BIẾN</h4>
                Trạng thái: <span id="status">Sẵn sàng</span><br>
                Thời gian: <span id="time">0.00</span> s<br>
                Vận tốc: <span id="vel">0.00</span> m/s
            </div>

            <div style="background: #fff3e0; padding: 15px; border-radius: 8px; border-left: 5px solid #ff9800;">
                <strong>Mô phỏng:</strong> Khi lật ống, viên bi rơi thẳng, chiếc lông chim sẽ liệng qua lại (trong không khí) và cả hai sẽ dừng lại chính xác tại đáy ống.
            </div>

            <label><b>Môi trường thí nghiệm:</b></label>
            <select id="mode" style="padding: 12px; border-radius: 5px;">
                <option value="vacuum">Chân không (Lý tưởng)</option>
                <option value="air">Có không khí (Sức cản)</option>
            </select>

            <button class="btn-main" id="flipAction">🔄 LẬT ỐNG VÀ THẢ VẬT</button>
            <button onclick="location.reload()" style="background:#607d8b;" class="btn-main">LÀM MỚI</button>
        </div>
    </div>

    <div class="footer">
        Bản quyền thuộc về Thạc sĩ Nguyễn Thị Ánh Hà
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 300;
    canvas.height = 550;

    const g = 9.8;
    const tubeH = 460;
    const tubeW = 100;
    const padding = 25; 

    let time = 0;
    let isRunning = false;
    let rotation = 0;
    let ballY = tubeH - padding;   
    let featherY = tubeH - padding; 
    let featherX = 0;
    let featherRot = 0;

    function drawFeather(x, y, drift, rot) {
        ctx.save();
        ctx.translate(x + drift, y);
        ctx.rotate(rot);
        
        // Sống lông
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, 18); ctx.stroke();

        // Bản lông tơ (vẽ chi tiết)
        ctx.fillStyle = "rgba(135, 206, 250, 0.8)";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.bezierCurveTo(-15, -10, -15, 10, 0, 18);
        ctx.bezierCurveTo(15, 10, 15, -10, 0, -18);
        ctx.fill();
        
        // Gân lông tơ
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        for(let i = -12; i < 15; i+=3) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(-10, i-5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(10, i-5); ctx.stroke();
        }
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(rotation * Math.PI / 180);

        // Vẽ ống
        ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
        ctx.fillRect(-tubeW/2, -tubeH/2, tubeW, tubeH);
        ctx.strokeStyle = "#34495e";
        ctx.lineWidth = 4;
        ctx.strokeRect(-tubeW/2, -tubeH/2, tubeW, tubeH);

        // Nắp
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(-tubeW/2 - 5, -tubeH/2 - 10, tubeW + 10, 10);
        ctx.fillRect(-tubeW/2 - 5, tubeH/2, tubeW + 10, 10);

        // Viên bi
        ctx.beginPath();
        ctx.arc(-20, -tubeH/2 + ballY, 12, 0, Math.PI*2);
        ctx.fillStyle = "#7f8c8d"; ctx.fill();
        ctx.strokeStyle = "#000"; ctx.stroke();

        // Lông chim
        drawFeather(25, -tubeH/2 + featherY, featherX, featherRot);

        ctx.restore();
    }

    function animate() {
        if(!isRunning) return;

        time += 0.016;
        const mode = document.getElementById('mode').value;

        // Cơ chế rơi bi
        let dropS = 0.5 * g * time * time * 55; // Hệ số hiển thị 55
        ballY = padding + dropS;
        if(ballY >= tubeH - padding) ballY = tubeH - padding;

        // Cơ chế rơi lông
        if(mode === 'vacuum') {
            featherY = ballY;
            featherX = 0; featherRot = 0;
        } else {
            featherY = padding + (time * 120); // Rơi chậm trong không khí
            featherX = Math.sin(time * 7) * 20; // Liệng ngang
            featherRot = Math.sin(time * 7) * 0.4;
        }

        if(featherY >= tubeH - padding) {
            featherY = tubeH - padding;
            featherX = 0; featherRot = Math.PI/2;
        }

        document.getElementById('time').innerText = time.toFixed(2);
        document.getElementById('vel').innerText = (ballY < tubeH - padding) ? (g * time).toFixed(2) : "0.00";

        render();

        if(ballY >= tubeH - padding && featherY >= tubeH - padding) {
            isRunning = false;
            document.getElementById('status').innerText = "Đã chạm đáy";
        } else {
            requestAnimationFrame(animate);
        }
    }

    document.getElementById('flipAction').onclick = () => {
        if(isRunning) return;
        
        // Chuẩn bị trạng thái rơi từ đỉnh
        time = 0;
        ballY = padding;
        featherY = padding;
        featherRot = 0;
        
        rotation += 180;
        document.getElementById('status').innerText = "Đang lật ống...";
        
        setTimeout(() => {
            isRunning = true;
            document.getElementById('status').innerText = "Đang rơi!";
            animate();
        }, 750); // Chờ xoay xong mới rơi
    };

    render(); // Vẽ trạng thái ban đầu
</script>
</body>
</html>
