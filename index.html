<body class="flex flex-col min-h-screen">
    <header id="user-info-bar" class="hidden bg-slate-900 text-white p-3 shadow-lg flex justify-between items-center sticky top-0 z-50">

        <div id="display-class-school" class="text-sm opacity-80"></div>

    <main class="flex-grow flex items-center justify-center p-4">
        <!-- Screen: Login -->
        <section id="login-screen" class="card text-center">
            <h1 class="text-4xl font-black gradient-text-3d mb-2">CÔNG VÀ CÔNG SUẤT</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                <input type="text" id="input-sbd" class="p-3 border-2 rounded-xl outline-none" placeholder="Số báo danh">
                <input type="text" id="input-name" class="p-3 border-2 rounded-xl outline-none" placeholder="Họ và tên">
                <input type="text" id="input-class" class="p-3 border-2 rounded-xl outline-none" placeholder="Lớp">

            </div>
            <button onclick="startGame()" class="bg-blue-700 text-white w-full mt-8 py-4 rounded-xl text-xl font-bold shadow-lg hover:bg-blue-800 transition-all">BẮT ĐẦU THI</button>
        </section>

        <!-- Screen: Quiz -->
        <section id="quiz-screen" class="hidden card w-full">
            <div class="flex justify-between items-end mb-2">
                <div>
                    <span id="question-part" class="text-xs font-bold uppercase text-slate-400 block"></span>
                    <span id="question-index" class="text-blue-700 font-black text-2xl">Câu 1</span>
                </div>
                <div id="timer-text" class="text-red-600 font-bold text-xl font-mono">90s</div>
            </div>

            <div id="question-content"></div>

                <div class="flex-grow"></div>
                <button id="next-btn" onclick="nextQuestion()" class="bg-blue-700 text-white px-8 py-3 rounded-xl font-bold">Tiếp theo</button>

    <script>
        function refreshMath() { renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false }); }
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(type === 'bell' ? 880 : 523, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        const bank = {
            partI: [
                { q: "Trường hợp nào sau đây có công cơ học?", options: ["Một người đang đứng yên giữ một vật nặng.", "Quả dừa rơi từ trên cây xuống đất.", "Hòn bi lăn trên mặt sàn nhẵn nằm ngang không ma sát.", "Một người đang ngồi học bài."], correct: 1, explain: "Công cơ học xuất hiện khi lực tác dụng làm vật dịch chuyển. Quả dừa rơi có lực trọng trường làm nó dịch chuyển nên có công." },
                { q: "Trong hệ đo lường quốc tế (SI), đơn vị đo công cơ học là", options: ["Newton ($N$).", "Joule ($J$).", "Watt ($W$).", "Pascal ($Pa$)."], correct: 1, explain: "Joule ($J$) là đơn vị chuẩn của công và năng lượng." },
                { q: "Đơn vị nào sau đây KHÔNG phải là đơn vị của công suất?", options: ["Watt ($W$).", "Kilowatt ($kW$).", "Joule trên giây ($J/s$).", "Kilogam ($kg$)."], correct: 3, explain: "Kilogam là đơn vị khối lượng." },
                { q: "Công thức tính công cơ học khi lực $F$ tác dụng làm vật dịch chuyển quãng đường $s$ theo hướng của lực là", options: ["$A = F/s$", "$A = F \\cdot s$", "$A = s/F$", "$A = F \\cdot s^2$"], correct: 1, explain: "$A = F \\cdot s$ là công thức cơ bản." },
                { q: "Công thức tính công suất là", options: ["$P = A \\cdot t$", "$P = A / t$", "$P = t / A$", "$P = F \\cdot s$"], correct: 1, explain: "Công suất đặc trưng cho tốc độ sinh công: $P = A/t$." },
                { q: "Đơn vị nào sau đây là đơn vị đo công suất?", options: ["Joule ($J$).", "Watt ($W$).", "Newton ($N$).", "Mét ($m$)."], correct: 1, explain: "Watt ($W$) là đơn vị công suất phổ biến nhất." },
                { q: "Một lực $F = 50\\ N$ tác dụng làm vật dịch chuyển $s = 2\\ m$ theo hướng của lực. Công của lực là", options: ["25 J.", "100 J.", "50 J.", "150 J."], correct: 1, explain: "$A = 50 \\cdot 2 = 100\\ J$." },
                { q: "Công suất cho ta biết", options: ["Công thực hiện được nhiều hay ít.", "Khả năng thực hiện công nhanh hay chậm.", "Thời gian thực hiện công.", "Quãng đường vật dịch chuyển."], correct: 1, explain: "Công suất chính là tốc độ thực hiện công." },
                { q: "Máy thực hiện công $12000\\ J$ trong $2$ phút. Công suất của máy là", options: ["$6000\\ W$.", "$100\\ W$.", "$24000\\ W$.", "$600\\ W$."], correct: 1, explain: "$t = 120\\ s \\Rightarrow P = 12000/120 = 100\\ W$." },
                { q: "Nếu tăng lực tác dụng lên 2 lần và quãng đường tăng 3 lần thì công tăng", options: ["5 lần.", "6 lần.", "Không đổi.", "Giảm 6 lần."], correct: 1, explain: "$2 \\cdot 3 = 6$ lần." },
                { q: "Trường hợp nào công suất lớn nhất?", options: ["50 N trong 20 s.", "50 N trong 10 s.", "100 N trong 20 s.", "100 N trong 40 s."], correct: 1, explain: "P tỉ lệ nghịch với t và thuận với F." },
                { q: "Vật nặng $2\\ kg$ rơi từ cao $5\\ m$. Tính công trọng lực ($1\\ kg = 10\\ N$)", options: ["10 J.", "50 J.", "100 J.", "200 J."], correct: 2, explain: "$A = 20 \\cdot 5 = 100\\ J$." },
                { q: "Đơn vị tương đương với $1\\ W$ là", options: ["$1\\ J \\cdot s$", "$1\\ J/s$", "$1\\ N \\cdot m$", "$1\\ Pa \\cdot s$"], correct: 1, explain: "$P = A/t \\Rightarrow 1\\ W = 1\\ J / 1\\ s$." },
                { q: "Phát biểu nào đúng?", options: ["Công suất tỉ lệ thuận với thời gian.", "Công suất lớn thì thực hiện công nhiều.", "Công suất lớn thì thực hiện công nhanh.", "Đơn vị công là Joule."], correct: 2, explain: "Công suất đặc trưng cho tốc độ làm việc." },
                { q: "Ngựa kéo xe lực $500\\ N$ đi được $1\\ km$. Công của ngựa là", options: ["500 J.", "50.000 J.", "500.000 J.", "5.000 J."], correct: 2, explain: "$A = 500 \\cdot 1000 = 500.000\\ J$." },
                { q: "Máy thực hiện công $5000\\ J$ trong $5\\ s$. Công suất là", options: ["1000 W.", "25000 W.", "500 W.", "2500 W."], correct: 0, explain: "$P = 5000/5 = 1000\\ W$." },
                { q: "Đổi $1,5\\ kW$ sang $W$:", options: ["15 W.", "150 W.", "1500 W.", "0,0015 W."], correct: 2, explain: "$1\\ kW = 1000\\ W$." },
                { q: "Lực tác dụng nhưng KHÔNG sinh công khi", options: ["Vật chuyển động theo lực.", "Vật đứng yên.", "Vật chuyển động chậm.", "Lực rất lớn."], correct: 1, explain: "Dịch chuyển bằng 0 thì công bằng 0." },
                { q: "Đẩy xe nhưng xe không nhúc nhích. Lực đẩy thực hiện công", options: ["Rất lớn.", "Bằng 0.", "Nhỏ.", "Âm."], correct: 1, explain: "$s=0$." },
                { q: "Động cơ $2\\ kW$ trong $1$ giờ sinh công bao nhiêu?", options: ["$2\\ kJ$.", "$7,2\\ kJ$.", "$7200\\ kJ$.", "$2000\\ J$."], correct: 2, explain: "$A = 2000 \\cdot 3600 = 7.200.000\\ J = 7200\\ kJ$." },
                { q: "Phát biểu SAI về công suất là", options: ["Công suất là công trong 1 giây.", "Công suất cho biết tốc độ sinh công.", "kW là đơn vị công suất.", "Công suất tỉ lệ nghịch với công."], correct: 3, explain: "P tỉ lệ thuận với A." },
                { q: "Công lớn nhất khi nào?", options: ["Lực lớn, đường nhỏ.", "Lực nhỏ, đường lớn.", "Cả hai đều lớn.", "Lực vuông góc đường đi."], correct: 2, explain: "Tích số lớn nhất." },
                { q: "Kí hiệu công và công suất lần lượt là", options: ["P và A.", "A và p.", "a và P.", "A và P."], correct: 3, explain: "Kí hiệu chuẩn: $A$ và $P$." },
                { q: "Người $50\\ kg$ leo cao $4\\ m$ trong $10\\ s$. Công suất là", options: ["20 W.", "200 W.", "500 W.", "125 W."], correct: 1, explain: "$P = (500 \\cdot 4)/10 = 200\\ W$." }
            ],
            partII: [
                {
                    q: "Vận động viên cử tạ nâng quả tạ $100\\ kg$ lên cao $2\\ m$ trong $2\\ s$. ($1\\ kg = 10\\ N$)",
                    items: [
                        { text: "Trọng lượng quả tạ là $1000\\ N$.", correct: true, reason: "$100 \\cdot 10 = 1000\\ N$." },
                        { text: "Công thực hiện là $200\\ J$.", correct: false, reason: "Sai, $A = 1000 \\cdot 2 = 2000\\ J$." },
                        { text: "Công suất là $1000\\ W$.", correct: true, reason: "$2000 / 2 = 1000\\ W$." },
                        { text: "Giữ tạ đứng yên $5\\ s$ thì công sinh ra là $5000\\ J$.", correct: false, reason: "Đứng yên không sinh công." }
                    ]
                },
                {
                    q: "Xét các đặc điểm về đơn vị và công thức Công - Công suất.",
                    items: [
                        { text: "Công thức $A = F/s$ là đúng.", correct: false, reason: "Sai, phải là $F \\cdot s$." },
                        { text: "1 kJ tương đương với 1000 J.", correct: true, reason: "Tiền tố k bằng 1000." },
                        { text: "1 MW bằng 1 triệu W.", correct: true, reason: "Mega bằng $10^6$." },
                        { text: "Watt là đơn vị của công.", correct: false, reason: "Watt là đơn vị công suất." }
                    ]
                },
                {
                    q: "Ô tô đang chạy trên đường nằm ngang.",
                    items: [

                        { text: "Công suất không phụ thuộc vào tốc độ.", correct: false, reason: "P = F.v nên phụ thuộc tốc độ." },
                        { text: "Trọng lực thực hiện công rất lớn.", correct: false, reason: "Trọng lực vuông góc hướng đi nên công bằng 0." },
                        { text: "Xe chạy nhanh hơn với cùng lực kéo thì P tăng.", correct: true, reason: "Vận tốc tăng thì công suất tăng." }
                    ]
                },
                {
                    q: "Máy kéo công suất $10\\ kW$ làm việc trong $30$ phút.",
                    items: [
                        { text: "Công thực hiện là $300\\ kJ$.", correct: false, reason: "Sai, $10000 \\cdot 1800 = 18.000\\ kJ$." },
                        { text: "Thời gian làm việc là $1800\\ s$.", correct: true, reason: "30 * 60 = 1800." },
                        { text: "Máy $20\\ kW$ làm cùng công sẽ mất 15 phút.", correct: true, reason: "Công suất gấp đôi, thời gian chia đôi." },
                        { text: "Công suất $10\\ kW$ nghĩa là mỗi giây sinh $10.000\\ J$.", correct: true, reason: "Định nghĩa W." }
                    ]
                },
                {
                    q: "Phân tích công của các lực tác dụng lên vật đang chuyển động ngang.",
                    items: [
                        { text: "Lực kéo sinh công phát động.", correct: true, reason: "Cùng chiều chuyển động." },

                        { text: "Trọng lực không sinh công.", correct: true, reason: "Vuông góc phương chuyển động." },

                },
                {
                    q: "Người kéo nước từ giếng sâu lên đều.",
                    items: [
                        { text: "Lực kéo của tay sinh công dương.", correct: true, reason: "Cùng chiều dịch chuyển gàu." },
                        { text: "Trọng lực gàu sinh công âm.", correct: true, reason: "Ngược chiều dịch chuyển." },
                        { text: "Lực kéo bằng trọng lượng gàu.", correct: true, reason: "Kéo đều." },
                        { text: "Công suất kéo tăng dần.", correct: false, reason: "Kéo đều P không đổi." }
                    ]
                },
                {
                    q: "Các nhận định về công cơ học.",
                    items: [
                        { text: "Chỉ khi vật dịch chuyển mới có công.", correct: true, reason: "Định nghĩa công." },
                        { text: "Lực vuông góc s vẫn có công.", correct: false, reason: "Cos 90 = 0." },
                        { text: "Công có đơn vị là N.m.", correct: true, reason: "J = N.m." },
                        { text: "Vật đứng yên dưới lực lớn vẫn có công.", correct: false, reason: "s=0." }

                },
                {
                    q: "Máy nâng hàng có thông số 500 W.",
                    items: [
                        { text: "Máy nâng được 500 kg mỗi giây.", correct: false, reason: "W là đơn vị công suất, không phải khối lượng." },
                        { text: "Mỗi giây máy làm việc sinh 500 J.", correct: true, reason: "Định nghĩa P." },

                        { text: "Máy này yếu hơn máy 1 kW.", correct: true, reason: "0,5 kW < 1 kW." }

            partIII: [

                { q: "Xếp thứ tự đơn vị tăng dần: 1. Watt; 2. kW; 3. MW; 4. mW. Dãy số là?", ans: "4123", explain: "mili < đơn vị < kilo < Mega." }

        let currentQuestions = []; let userAnswers = []; let currentIndex = 0; let timer; let timeRemaining = 0;

        function startGame() {
            const name = document.getElementById('input-name').value; const sbd = document.getElementById('input-sbd').value;
            if (!name || !sbd) return alert("Vui lòng nhập đầy đủ!");
            document.getElementById('display-name-sbd').innerText = `${name.toUpperCase()} (SBD: ${sbd})`;
            document.getElementById('display-class-school').innerText = `${document.getElementById('input-class').value} | ${document.getElementById('input-school').value}`;
            document.getElementById('login-screen').classList.add('hidden'); document.getElementById('user-info-bar').classList.remove('hidden'); document.getElementById('quiz-screen').classList.remove('hidden');
            initQuiz();
        }

        function initQuiz() {
            const p1 = shuffle([...bank.partI]).slice(0, 12); const p2 = shuffle([...bank.partII]).slice(0, 4); const p3 = shuffle([...bank.partIII]).slice(0, 4);
            currentQuestions = [...p1, ...p2, ...p3]; userAnswers = new Array(20).fill(null); currentIndex = 0; showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex]; const content = document.getElementById('question-content');
            document.getElementById('question-index').innerText = `Câu ${currentIndex + 1}`;
            document.getElementById('question-part').innerText = currentIndex < 12 ? "Phần I: Đa lựa chọn" : (currentIndex < 16 ? "Phần II: Đúng/Sai" : "Phần III: Trả lời ngắn");
            clearInterval(timer); timeRemaining = currentIndex < 12 ? 90 : 120; updateTimerUI();
            timer = setInterval(() => { timeRemaining--; updateTimerUI(); if (timeRemaining <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
            content.innerHTML = `<h3 class="text-xl font-bold mb-4">${q.q}</h3>`;
            if (currentIndex < 12) {
                q.options.forEach((opt, i) => {
                    const div = document.createElement('div'); div.className = `option-card ${userAnswers[currentIndex] === i ? 'selected' : ''}`;
                    div.innerHTML = `<span class="bg-blue-100 text-blue-700 w-8 h-8 flex items-center justify-center rounded font-bold mr-3">${String.fromCharCode(65+i)}</span> <span>${opt}</span>`;
                    div.onclick = () => { userAnswers[currentIndex] = i; playSound('ping'); showQuestion(); };
                    content.appendChild(div);
                });
            } else if (currentIndex < 16) {
                if (!userAnswers[currentIndex]) userAnswers[currentIndex] = [null, null, null, null];
                q.items.forEach((it, i) => {
                    const row = document.createElement('div'); row.className = "mb-3 flex items-center justify-between p-3 bg-slate-50 rounded border";
                    row.innerHTML = `<div class="text-base">${String.fromCharCode(97+i)}) ${it.text}</div><div class="flex space-x-2">
                        <button class="tf-btn ${userAnswers[currentIndex][i]===true?'true-active':''}" onclick="selectTF(${i}, true)">Đ</button>
                        <button class="tf-btn ${userAnswers[currentIndex][i]===false?'false-active':''}" onclick="selectTF(${i}, false)">S</button></div>`;
                    content.appendChild(row);
                });
            } else {
                content.innerHTML += `<input type="text" id="sa" class="w-full p-3 border-2 rounded text-center text-xl font-bold" value="${userAnswers[currentIndex]||""}" oninput="userAnswers[currentIndex]=this.value">`;
                setTimeout(() => document.getElementById('sa').focus(), 100);
            }
            document.getElementById('prev-btn').classList.toggle('hidden', currentIndex === 0);
            document.getElementById('next-btn').classList.toggle('hidden', currentIndex === 19);
            document.getElementById('submit-btn').classList.toggle('hidden', currentIndex !== 19);
            refreshMath();
        }

        function selectTF(i, v) { userAnswers[currentIndex][i] = v; playSound('ping'); showQuestion(); }
        function nextQuestion() { if (currentIndex < 19) { currentIndex++; showQuestion(); } }
        function prevQuestion() { if (currentIndex > 0) { currentIndex--; showQuestion(); } }
        function updateTimerUI() { document.getElementById('timer-progress').style.width = `${(timeRemaining / (currentIndex < 12 ? 90 : 120)) * 100}%`; document.getElementById('timer-text').innerText = `${timeRemaining}s`; }
        function showConfirmation() { if (confirm("Nộp bài?")) calculateResults(); }

        function calculateResults() {
            clearInterval(timer); let s1 = 0, s2 = 0, s3 = 0;
            currentQuestions.forEach((q, i) => {
                if (i < 12) { if (userAnswers[i] === q.correct) s1 += 0.25; }
                else if (i < 16) { 
                    let c = 0; q.items.forEach((it, idx) => { if (userAnswers[i] && userAnswers[i][idx] === it.correct) c++; });
                    s2 += (c === 4 ? 0.5 : (c === 3 ? 0.25 : (c === 2 ? 0.125 : (c === 1 ? 0.0625 : 0))));
                } else { if (userAnswers[i]?.trim() === q.ans) s3 += 0.5; }
            });
            displayResults((s1 + s2 + s3).toFixed(1), s1, s2, s3);
        }

        function displayResults(total, s1, s2, s3) {
            document.getElementById('quiz-screen').classList.add('hidden'); document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = total;
            const badge = document.getElementById('rank-badge');
            if (total >= 6) { badge.innerText = "XUẤT SẮC"; badge.style.backgroundColor = "#eab308"; }
            else if (total >= 5) { badge.innerText = "GIỎI"; badge.style.backgroundColor = "#22c55e"; }
            else if (total >= 4) { badge.innerText = "KHÁ"; badge.style.backgroundColor = "#3b82f6"; }
            else if (total >= 3) { badge.innerText = "ĐẠT"; badge.style.backgroundColor = "#f97316"; }
            else { badge.innerText = "CHƯA ĐẠT"; badge.style.backgroundColor = "#ef4444"; }

            const review = document.getElementById('review-section'); review.innerHTML = '<h3 class="text-xl font-black mb-4 uppercase">Xem lại chi tiết</h3>';
            currentQuestions.forEach((q, i) => {
                const item = document.createElement('div'); item.className = "history-item";
                let html = `<p class="font-bold mb-3">Câu ${i+1}: ${q.q}</p>`;
                if (i < 12) {
                    q.options.forEach((opt, idx) => {
                        let cls = idx === q.correct ? 'correct-review' : (idx === userAnswers[i] ? 'incorrect-review' : 'review-opt');
                        html += `<div class="${cls}"><strong>${String.fromCharCode(65+idx)}.</strong> ${opt} ${idx===q.correct?'(Đúng)':(idx===userAnswers[i]?'(Bạn chọn)': '')}</div>`;
                    });
                } else if (i < 16) {
                    q.items.forEach((sub, idx) => {
                        const userVal = userAnswers[i] ? userAnswers[i][idx] : null;
                        const isOk = userVal === sub.correct;
                        html += `<div class="p-2 border rounded bg-white mb-2 text-sm">
                            <p>${String.fromCharCode(97+idx)}) ${sub.text}</p>
                            <span class="text-green-600 font-bold">Đáp án: ${sub.correct?'Đ':'S'}</span> | 
                            <span class="${isOk?'text-blue-600':'text-red-500'} font-bold">Bạn: ${userVal===null?'_':(userVal?'Đ':'S')}</span></div>`;
                    });
                } else {
                    html += `<div class="p-3 bg-white border rounded">
                        <p class="text-green-600 font-bold">Đáp án đúng: ${q.ans}</p>
                        <p class="${userAnswers[i]===q.ans?'text-blue-600':'text-red-500'} font-bold">Bạn nhập: ${userAnswers[i]||"Bỏ trống"}</p></div>`;
                }
                html += `<div class="explanation-box"><strong>💡 Giải thích:</strong> ${q.explain}</div>`;
                item.innerHTML = html; review.appendChild(item);
            });
            playSound('bell'); refreshMath();
        }

        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
        window.onload = refreshMath;
    </script>
</body>
</html>
