        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'thau-kinh-9-v12';
        const COLLECTION_NAME = 'results_khtn9_v12';
        const SECRET_CODE = "Sangtao2026@";
        let userAuth = null;

        signInAnonymously(auth);
        onAuthStateChanged(auth, u => userAuth = u);

        const BANK = {
            part1: [
                { q: "Thấu kính hội tụ có đặc điểm cấu tạo nào sau đây?", a: ["Phần rìa dày hơn phần giữa.", "Phần rìa mỏng hơn phần giữa.", "Hai mặt đều phẳng.", "Làm từ kim loại mờ."], c: 1, explain: "TKHT có rìa mỏng hơn giữa. Đây là cấu trúc vật lí cho phép hội tụ chùm sáng." },
                { q: "Tia tới song song với trục chính của thấu kính hội tụ cho tia ló đi qua", a: ["quang tâm O.", "tiêu điểm ảnh chính F'.", "trục phụ.", "điểm bất kì."], c: 1, explain: "Theo tính chất tia sáng đặc biệt qua TKHT." },
                { q: "Vật thật đặt trước thấu kính phân kì luôn cho ảnh", a: ["ảo, cùng chiều, lớn hơn vật.", "ảo, cùng chiều, nhỏ hơn vật.", "thật, ngược chiều, nhỏ hơn vật.", "thật, cùng chiều, bằng vật."], c: 1, explain: "TKPK luôn cho ảnh ảo nhỏ hơn vật đối với vật thật." },
                { q: "Số bội giác G của kính lúp ($f$ tính bằng cm) là", a: ["G = 25/f", "G = f/25", "G = 25.f", "G = 1/f"], c: 0, explain: "Công thức chuẩn tính số bội giác khi nhìn vật ở khoảng cực cận." },
                { q: "Kính lão dùng cho mắt người già thực chất là", a: ["thấu kính hội tụ.", "thấu kính phân kì.", "gương cầu lồi.", "tấm kính phẳng."], c: 0, explain: "Giúp mắt lão hội tụ chùm sáng tại đúng võng mạc khi nhìn gần." },
                { q: "Vật đặt tại $d = 2f$ trước thấu kính hội tụ thì ảnh thu được", a: ["thật, ngược chiều, bằng vật.", "ảo, cùng chiều, lớn hơn vật.", "thật, nhỏ hơn vật.", "ảo, nhỏ hơn vật."], c: 0, explain: "Đây là vị trí đặc biệt trong quang hình học." },
                { q: "Tia sáng đi qua quang tâm O của mọi thấu kính mỏng thì", a: ["khúc xạ qua F.", "truyền thẳng không đổi hướng.", "phản xạ ngược lại.", "biến mất."], c: 1, explain: "Đặc điểm cơ bản của quang tâm O." },
                { q: "Vật kính của máy ảnh dùng loại thấu kính nào?", a: ["Phân kì.", "Hội tụ.", "Gương phẳng.", "Lăng kính."], c: 1, explain: "Vật kính cần hội tụ ánh sáng từ vật lên phim/cảm biến." },
                { q: "Khoảng cách từ quang tâm đến tiêu điểm chính gọi là", a: ["trục chính.", "tiêu cự.", "độ tụ.", "bán kính cong."], c: 1, explain: "Kí hiệu là f." },
                { q: "Đơn vị chuẩn của tiêu cự trong hệ SI là", a: ["Newton.", "Mét.", "Pascal.", "Joule."], c: 1, explain: "Tiêu cự là độ dài nên đơn vị là mét." },
                { q: "Khi quan sát vật bằng kính lúp, ta đặt vật", a: ["rất xa kính.", "ngoài khoảng tiêu cự.", "trong khoảng tiêu cự.", "tại đúng tiêu điểm ảnh."], c: 2, explain: "Để tạo ảnh ảo phóng đại cùng chiều." },
                { q: "Hiện tượng thấu kính làm loe rộng chùm tia tới song song trục chính gọi là", a: ["hội tụ.", "phân kì.", "tán sắc.", "nhiễu xạ."], c: 1, explain: "Đây là tên gọi đặc trưng cho TKPK." },
                { q: "Một kính lúp có $f = 5cm$. Số bội giác G của kính là", a: ["G = 2", "G = 5", "G = 10", "G = 25"], c: 1, explain: "G = 25 / 5 = 5." },
                { q: "Ảnh thật tạo bởi thấu kính hội tụ luôn có tính chất", a: ["cùng chiều.", "ngược chiều.", "ảo.", "hội tụ tại O."], c: 1, explain: "Ảnh thật từ vật thật luôn ngược chiều." }
            ],
            part2: [
                { lead: "Thấu kính hội tụ f = 15 cm. Vật AB đặt cách kính d = 10 cm. Chọn Đúng/Sai.", options: [{ text: "Thấu kính cho ảnh ảo cùng chiều vật.", type: true }, { text: "Ảnh thu được lớn hơn vật thật.", type: true }, { text: "Khoảng cách từ ảnh đến kính nhỏ hơn 10 cm.", type: false }, { text: "Nếu dời vật ra xa thêm 10 cm ảnh trở thành thật.", type: true }], explain: "d < f cho ảnh ảo phóng đại. Khi d=20 > f ảnh trở thành thật." },
                { lead: "Xét thấu kính phân kì (TKPK) trong thí nghiệm.", options: [{ text: "Rìa thấu kính dày hơn phần giữa.", type: true }, { text: "Cho ảnh thật nếu vật rất gần kính.", type: false }, { text: "Tia ló của chùm tới song song loe rộng ra.", type: true }, { text: "Đường kéo dài tia ló song song trục đi qua F.", type: true }], explain: "TKPK luôn cho ảnh ảo và làm phân kì chùm sáng." }
            ],
            part3: [
                { q: "Kính lúp ghi 10X. Tính tiêu cự của kính này (cm).", ans: "2,5", explain: "f = 25/10 = 2,5 cm." },
                { q: "TKHT f=10cm. Vật tại d=20cm. Ảnh cách kính bao nhiêu cm?", ans: "20", explain: "d=2f => d'=2f=20cm." },
                { q: "TKPK f=20cm. Vật tại d=20cm. Ảnh ảo cách kính bao nhiêu cm?", ans: "10", explain: "Vật tại F của TKPK cho ảnh tại f/2." },
                { q: "Ghi số tiêu điểm chính của một thấu kính mỏng.", ans: "2", explain: "Có 2 tiêu điểm F và F'." }
            ]
        };

        const shuffleArray = (a) => {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        };

        let currentQuestions = [], userAnswers = [], currentIndex = 0, timer = null, studentData = {};

        // ATTACH FUNCTIONS TO WINDOW
        window.startGame = () => {
            const name = document.getElementById('input-name').value.trim();
            if(!name) { alert("Vui lòng nhập Họ tên!"); return; }
            studentData = { name, sbd: document.getElementById('input-sbd').value || "000", class: document.getElementById('input-class').value || "9A", school: document.getElementById('input-school').value || "THCS" };

            const p1 = shuffleArray([...BANK.part1]).slice(0, 12).map(q => {
                let options = q.a.map((txt, i) => ({ txt, isCorrect: i === q.c }));
                options = shuffleArray(options); 
                return { q: q.q, a: options.map(o => o.txt), c: options.findIndex(o => o.isCorrect), explain: q.explain, type: 'mc' };
            });
            const p2 = shuffleArray([...BANK.part2]).slice(0, 4).map(q => ({...q, options: shuffleArray([...q.options]), type: 'tf'}));
            const p3 = shuffleArray([...BANK.part3]).slice(0, 4).map(q => ({...q, type: 'sa'}));
            
            currentQuestions = [...p1, ...p2, ...p3];
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;

            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            document.getElementById('screen-game').classList.add('flex');
            document.getElementById('student-info-display').innerText = `${studentData.name.toUpperCase()} | SBD: ${studentData.sbd} | ${studentData.class}`;
            window.showQuestion();
        };

        window.showQuestion = () => {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('question-container');
            let displayNum = 0, partText = "", timeLimit = 90;

            if (currentIndex < 12) { displayNum = currentIndex + 1; partText = "Phần I. Đa lựa chọn (0.25đ)"; }
            else if (currentIndex < 16) { displayNum = currentIndex - 11; partText = "Phần II. Đúng/Sai (Max 0.5đ)"; timeLimit = 120; }
            else { displayNum = currentIndex - 15; partText = "Phần III. Trả lời ngắn (0,5đ)"; timeLimit = 120; }

            document.getElementById('q-progress').innerText = currentIndex + 1;
            
            let html = `<div class="mb-2 text-[7pt] font-black uppercase text-blue-300 tracking-[0.2em]">${partText}</div>
                        <div class="mb-6"><span class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg">CÂU ${displayNum}</span></div>`;

            if (q.type === 'mc') {
                html += `<div class="text-xl sm:text-2xl font-bold mb-8 text-slate-800 leading-snug">${q.q}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                q.a.forEach((opt, i) => {
                    const sel = userAnswers[currentIndex] === i ? 'option-selected' : '';
                    html += `<div onclick="window.setMC(${i})" class="option-card p-4 sm:p-6 border-2 flex items-center gap-4 ${sel}">
                                <span class="w-8 sm:w-10 h-8 sm:h-10 rounded-xl bg-slate-100 flex items-center justify-center font-black text-slate-400 border">${String.fromCharCode(65+i)}</span>
                                <span class="text-base sm:text-lg font-medium">${opt}</span>
                             </div>`;
                });
                html += `</div>`;
            } else if (q.type === 'tf') {
                html += `<div class="text-xl sm:text-2xl font-bold mb-8 text-slate-800">${q.lead}</div><div class="space-y-3">`;
                const saved = userAnswers[currentIndex] || [null, null, null, null];
                q.options.forEach((opt, i) => {
                    html += `<div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 border-white shadow-sm">
                                <span class="text-base font-medium flex-1 mr-4"><b>${String.fromCharCode(97+i)})</b> ${opt.text}</span>
                                <div class="flex gap-2">
                                    <button onclick="window.setTF(${i}, true)" class="tf-btn ${saved[i]===true?'selected-true':'bg-white text-slate-300'}">Đúng</button>
                                    <button onclick="window.setTF(${i}, false)" class="tf-btn ${saved[i]===false?'selected-false':'bg-white text-slate-300'}">Sai</button>
                                </div>
                             </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="text-2xl font-bold mb-10 text-center text-slate-800 leading-relaxed">${q.q}</div>
                         <div class="flex flex-col items-center">
                            <input type="text" maxlength="5" oninput="window.setSA(this.value)" value="${userAnswers[currentIndex]||''}" class="w-full max-w-sm p-6 border-b-8 border-blue-600 text-center text-6xl font-black focus:border-yellow-400 outline-none transition bg-transparent" placeholder="...">
                         </div>`;
            }

            container.innerHTML = html;
            document.getElementById('btn-back').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerHTML = currentIndex === 19 ? 'NỘP BÀI <i class="fas fa-paper-plane ml-2"></i>' : 'TIẾP THEO <i class="fas fa-arrow-right ml-2"></i>';
            
            window.startTimer(timeLimit);
            if (window.MathJax) MathJax.typesetPromise([container]);
        };

        window.startTimer = (sec) => {
            if (timer) clearInterval(timer);
            let time = sec;
            const bar = document.getElementById('timer-bar'), display = document.getElementById('timer-display');
            timer = setInterval(() => {
                display.innerText = `${time}s`;
                bar.style.width = (time/sec)*100 + "%";
                if (time <= 0) { clearInterval(timer); window.nextQuestion(); }
                time--;
            }, 1000);
        };

        window.setMC = (i) => { userAnswers[currentIndex] = i; window.playSound('ping'); window.showQuestion(); };
        window.setTF = (idx, val) => { if(!userAnswers[currentIndex]) userAnswers[currentIndex] = [null,null,null,null]; userAnswers[currentIndex][idx] = val; window.playSound('ping'); window.showQuestion(); };
        window.setSA = (val) => { userAnswers[currentIndex] = val.trim(); };
        window.prevQuestion = () => { if(currentIndex > 0) { currentIndex--; window.showQuestion(); } };
        window.nextQuestion = () => { if(currentIndex < 19) { currentIndex++; window.showQuestion(); } else { window.finishGame(); } };

        window.playSound = (t) => {
            try { const ctx = new AudioContext(), o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(t==='ping'?800:440, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); o.start(); o.stop(ctx.currentTime + 0.3); } catch(e) {}
        };

        window.finishGame = async () => {
            clearInterval(timer);
            const btn = document.getElementById('btn-next');
            btn.disabled = true; btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> ĐANG GỬI...`;

            let s1=0, s2=0, s3=0;
            currentQuestions.forEach((q, i) => {
                const ans = userAnswers[i];
                if (i < 12) { if (ans === q.c) s1 += 0.25; }
                else if (i < 16 && ans) {
                    let c = 0; q.options.forEach((opt, idx) => { if (ans[idx] === opt.type) c++; });
                    s2 += [0, 0.0625, 0.125, 0.25, 0.5][c];
                } else if (i >= 16 && ans === q.ans) s3 += 0.5;
            });

            const total = parseFloat((s1 + s2 + s3).toFixed(1));
            let r = total >= 6 ? "XUẤT SẮC" : total >= 5 ? "GIỎI" : total >= 4 ? "KHÁ" : total >= 3 ? "ĐẠT" : "CHƯA ĐẠT";

            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            document.getElementById('screen-results').classList.add('flex');
            
            document.getElementById('total-score').innerText = `${total.toFixed(1)} / 7.0`;
            document.getElementById('score-p1').innerText = s1.toFixed(2);
            document.getElementById('score-p2').innerText = s2.toFixed(2);
            document.getElementById('score-p3').innerText = s3.toFixed(2);
            document.getElementById('result-rank').innerText = r;

            if (userAuth) {
                const statusBox = document.getElementById('save-status-container');
                statusBox.classList.remove('hidden'); statusBox.classList.add('flex');
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME), {
                        hoTen: studentData.name, sbd: studentData.sbd, lop: studentData.class, truong: studentData.school,
                        diemTong: total, xepLoai: r, thoiGianNop: serverTimestamp()
                    });
                    document.getElementById('save-status').innerHTML = "Đã đẩy dữ liệu lên Firestore thành công! ✅";
                    document.getElementById('save-icon').className = "fas fa-check-circle text-emerald-500 animate-bounce";
                } catch (e) { document.getElementById('save-status').innerText = "Lỗi Firestore! ❌"; }
            }
        };

        window.showReview = () => {
            const container = document.getElementById('review-container');
            container.innerHTML = '<h3 class="text-3xl font-black mb-10 text-center text-slate-800 uppercase tracking-tighter">Phân tích lời giải</h3>';
            container.classList.remove('hidden');

            currentQuestions.forEach((q, i) => {
                const ans = userAnswers[i];
                let isC = (i < 12) ? (ans === q.c) : (i >= 16 ? (ans === q.ans) : true);
                let html = `<div class="card p-8 border-l-[16px] ${isC ? 'border-emerald-500' : 'border-rose-500'} mb-8 text-left">
                    <div class="font-black text-xl mb-4 text-slate-800 leading-snug">Câu ${i < 12 ? i+1 : (i < 16 ? i-11 : i-15)}: ${i < 12 ? q.q : (i < 16 ? q.lead : q.q)}</div>`;
                if(i < 12) {
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">`;
                    q.a.forEach((opt, idx) => {
                        let style = (idx === q.c) ? 'bg-emerald-50 border-emerald-400 font-bold text-emerald-900' : (idx === ans ? 'bg-rose-50 border-rose-400 font-bold text-rose-900' : 'bg-slate-50 border-slate-200 opacity-60');
                        html += `<div class="p-3 border-2 rounded-2xl text-sm ${style}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
                    });
                    html += `</div>`;
                } else if(i < 16) {
                    html += `<div class="space-y-3 mb-4">`;
                    q.options.forEach((opt, idx) => {
                        const uV = ans ? ans[idx] : null, isMatch = uV === opt.type;
                        html += `<div class="p-2 border rounded-xl text-[10px] ${isMatch?'bg-emerald-50':'bg-rose-50'} flex justify-between font-black">
                                    <span>${String.fromCharCode(97+idx)}. ${opt.text}</span>
                                    <span>${uV===null?'_':(uV?'Đ':'S')} | Đ.án: ${opt.type?'Đ':'S'}</span>
                                 </div>`;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="flex gap-4 mb-4"><div class="flex-1 p-5 bg-slate-50 rounded-3xl border text-xs font-black uppercase tracking-widest text-slate-400">Bạn nhập: <b class="text-slate-900 text-lg">${ans||'_'}</b></div><div class="flex-1 p-5 bg-emerald-50 rounded-3xl border border-emerald-200 text-xs font-black uppercase tracking-widest text-emerald-700">Đ.án: <b class="text-lg">${q.ans}</b></div></div>`;
                }
                html += `<div class="p-6 bg-blue-50 text-blue-900 text-sm rounded-[1.5rem] border-2 border-blue-100/50 italic font-bold"><b>Lý giải:</b> ${q.explain}</div></div>`;
                container.innerHTML += html;
            });
            setTimeout(() => { container.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
            if (window.MathJax) MathJax.typesetPromise([container]);
        };

        window.restartGame = () => location.reload();
        window.showTeacherAuth = () => { document.getElementById('screen-login').classList.add('hidden'); document.getElementById('screen-teacher-auth').classList.remove('hidden'); document.getElementById('screen-teacher-auth').classList.add('flex'); };
        window.backToStudentLogin = () => location.reload();
        window.checkTeacherCode = () => { if (document.getElementById('secret-code').value === SECRET_CODE) { document.getElementById('screen-teacher-auth').classList.add('hidden'); document.getElementById('screen-dashboard').classList.remove('hidden'); document.getElementById('screen-dashboard').classList.add('flex'); initDashboard(); } else { alert("Sai mã!"); } };

        const initDashboard = () => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME), (snap) => {
                const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                data.sort((a,b) => (b.thoiGianNop?.toMillis()||0)-(a.thoiGianNop?.toMillis()||0));
                const tbody = document.getElementById("table-body"); tbody.innerHTML = "";
                data.forEach(item => {
                    const tr = document.createElement("tr"); tr.className = "bg-white border-b hover:bg-blue-50 transition-colors";
                    tr.innerHTML = `<td class="p-4 text-[7pt] text-slate-300 font-bold uppercase">${item.thoiGianNop?new Date(item.thoiGianNop.toMillis()).toLocaleString('vi-VN'):'--'}</td><td class="p-4 font-black text-slate-700">${item.sbd}</td><td class="p-4 font-black text-blue-900 uppercase">${item.hoTen}</td><td class="p-4 text-center font-black text-xl text-blue-600">${item.diemTong}</td><td class="p-4 text-center font-black text-[8pt] text-slate-400">${item.xepLoai}</td><td class="p-4 text-center"><button onclick="window.delRec('${item.id}')" class="text-red-400 hover:scale-125 transition-transform"><i class="fas fa-trash-alt"></i></button></td>`;
                    tbody.appendChild(tr);
                });
            });
        };

        window.delRec = async (id) => { if(confirm("Xóa kết quả này?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, id)); };
        window.exportCSV = () => {
            let csv = "\uFEFFThời gian,SBD,Họ tên,Tổng điểm,Xếp loại\n";
            Array.from(document.getElementById('table-body').rows).forEach(row => { csv += Array.from(row.cells).slice(0,5).map(c=>`"${c.innerText}"`).join(",") + "\n"; });
            const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8," + csv); link.download = "KetQua.csv"; link.click();
        };
    </script>
</body>
</html>
